<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SentiFy | E‑Commerce Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>

<!-- Prevent flash: apply saved theme before paint -->
<script>
  (function() {
    try {
      const saved = localStorage.getItem('sentify_theme');
      if (saved === 'dark') {
        document.documentElement.classList.add('dark');
      }
    } catch (e) {
      console.warn('theme init failed', e);
    }
  })();
</script>


  <link rel="stylesheet" href="sentify.css" />
  <link rel="shortcut icon" href="./assests/logo.png" type="image/x-icon" />
</head>

<body class="bg-gray-50 text-gray-800 antialiased">
  <!-- NAVBAR -->
  <header class="bg-white dark:bg-gray-800 dark:text-gray-100 shadow-sm sticky top-0 z-30 transition">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <a class="flex items-center gap-3" href="#">
        <div class="w-10 h-10 text-white font-bold rounded-md flex items-center justify-center">
          <img src="./assests/logo_white.png" class="logo" height="" alt="" />
        </div>
        <div>
          <div class="font-semibold">
            <img src="./assests/logo_name_white.png" class="logo_name h-10 w-25" alt="" />
          </div>
          <div class="text-xs text-gray-500 dark:text-gray-400">
            Fashion for Everyone
          </div>
        </div>
      </a>

      <nav class="hidden md:flex gap-10 text-sm font-medium">
        <a href="index.html" class="hover:text-red-600 transition">Home</a>
        <a href="men.html" class="text-red-600 hover:text-red-600 transition">Men</a>
        <a href="women.html" class="hover:text-red-600 transition">Women</a>
        <a href="kids.html" class="hover:text-red-600 transition">Kids</a>
        <a href="about.html" class="hover:text-red-600 transition">About</a>
      </nav>

      <div class="flex items-center gap-4">
        <!-- Theme Toggle -->
        <button id="theme-toggle"
          class="p-2 rounded-md border border-gray-200 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-700 transition">
          🌙
        </button>

        <div id="user-area" class="text-sm"></div>
        <button id="btn-signin"
          class="px-3 py-2 rounded-md border border-gray-200 hover:bg-gray-100 dark:border-gray-600 dark:hover:bg-gray-700">
          Sign in
        </button>
        <button id="btn-signup" class="px-3 py-2 rounded-md bg-red-600 text-white hover:bg-red-700">
          Sign up
        </button>

        <div class="relative">
          <button id="btn-cart" class="p-2 rounded-md hover:bg-gray-100 dark:hover:bg-gray-700 relative">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2 7h14l-2-7M9 21a1 1 0 11-2 0 1 1 0 012 0zm8 0a1 1 0 11-2 0 1 1 0 012 0z" />
            </svg>
            <span id="cart-badge"
              class="cart-badge inline-flex items-center justify-center px-2 py-0.5 text-xs font-medium rounded-full bg-red-600 text-white">0</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- HERO -->
  <section id="home" class="max-w-6xl mx-auto px-4 py-12 flex flex-col md:flex-row items-center gap-6">
    <div class="flex-1 animate-float">
      <h1 class="welcome text-4xl font-extrabold">
        Step into the <span class="text-red-600">Men’s Zone</span>
      </h1>
      <p class="mt-3 text-gray-600 dark:text-gray-400 max-w-md">
        From casual classics to premium fits — find everything that defines
        your style, all in one place.
      </p>
      <div class="mt-4 flex gap-3">
        <a href="#" id="hero-shop" class="px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700">Shop Now</a>
      </div>
    </div>
    <div class="w-full md:w-80 animate-float">
      <img src="./assests/men_sentiFy.png"
        class="rounded-xl shadow-lg w-full h-80 object-cover object-top" alt="hero" />
    </div>
  </section>

  <!-- MEN SECTION -->
<section id="men" class="max-w-6xl mx-auto px-4 py-12">
  <h2 class="text-2xl font-bold mb-6 border-l-4 border-red-600 pl-3">
    Men's Collection
  </h2>
  <div
    id="men-products"
    class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"
  ></div>
</section>


  <!-- FOOTER -->
  <footer class="text-center text-sm text-gray-500 py-2 bg-white">
    Made with ❤️ by SentiFy Team
  </footer>

  <!-- SIGNUP / SIGNIN MODAL (hidden, inserted dynamically) -->
  <div id="auth-modal" class="fixed inset-0 hidden items-center justify-center z-50">
    <div class="modal-backdrop absolute inset-0"></div>
    <div class="bg-white rounded-xl shadow-xl z-10 w-full max-w-md p-6 animate-pop">
      <div class="flex justify-between items-center mb-4">
        <h3 id="auth-title" class="text-lg font-semibold">Sign up</h3>
        <button id="auth-close" class="text-gray-500 hover:text-gray-700">
          ✕
        </button>
      </div>

      <form id="auth-form" class="space-y-3">
        <div id="name-field">
          <label class="text-sm text-gray-600">Name</label>
          <input id="name" class="mt-1 block w-full border rounded-md px-3 py-2" />
          <p hidden id="name_error" class="text-sm mt-2 text-red-600"></p>
        </div>
        <div>
          <label class="text-sm text-gray-600">Email</label>
          <input id="email" type="text" class="mt-1 block w-full border rounded-md px-3 py-2" required />
          <p hidden id="email_error" class="text-sm mt-2 text-red-600"></p>
        </div>
        <div>
          <label class="text-sm text-gray-600">Password</label>
          <input id="password" type="password" class="mt-1 block w-full border rounded-md px-3 py-2" required />
          <p hidden id="pass_error" class="text-sm mt-2 text-red-600"></p>
        </div>

        <div class="flex justify-end items-center gap-2">
          <button type="button" id="switch-auth" class="text-sm text-gray-600">
            Have an account? Sign in
          </button>
          <button type="submit" class="px-4 py-2 rounded-md bg-red-600 text-white">
            Submit
          </button>
        </div>
      </form>

      <p id="auth-msg" class="text-sm mt-2 text-red-600"></p>
    </div>
  </div>

  <!-- CART PANEL -->
  <aside id="cart-panel"
    class="fixed right-0 top-0 h-full w-full sm:w-96 transform translate-x-full transition-transform duration-300 bg-white shadow-lg z-40">
    <div class="p-4 flex items-center justify-between border-b">
      <h3 class="font-semibold">Your Cart</h3>
      <div>
        <button id="clear-cart" class="text-sm text-red-600 mr-2">
          Clear
        </button>
        <button id="close-cart" class="text-gray-600">Close</button>
      </div>
    </div>
    <div id="cart-items" class="p-4 space-y-3 overflow-y-auto h-[70vh]"></div>
    <div class="p-4 border-t">
      <div class="flex justify-between items-center mb-3">
        <div class="text-sm text-gray-600">Total</div>
        <div id="cart-total" class="font-semibold">₹0.00</div>
      </div>
      <button id="checkout" class="w-full py-2 rounded-md bg-green-600 text-white">
        Checkout
      </button>
    </div>
  </aside>

  <script src="sentify.js"></script>
</body>

</html>
